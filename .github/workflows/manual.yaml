on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ github.repository }}
          ref: ${{github.ref}}
          fetch-depth: 0
      - name: List files in the repository
        run: ls ${{github.workspace}}
