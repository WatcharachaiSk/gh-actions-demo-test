name: Hello World!

on: 
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/*"
  pull_request: 
    branches: [main]

  repository_dispatch:
    types: ["on-demand-test"]

jobs:
  hello-job:
    name: Test Job1
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-line script
        run: echo "Hello Github Actions! na"
        
      - name: Show payload from external trigger
        run: |
          echo "Trigger Event: ${{ github.event_name }}"
          echo "Client Payload Message: ${{ github.event.client_payload.message }}"

  second-job:
    runs-on: windows-latest
    needs: hello-job
    steps:
      - run: echo "This job is running on ${{ runner.os }}"